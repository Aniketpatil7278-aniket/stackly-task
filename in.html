<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Position Example</title>

<style>
body {
    font-family: Arial;
    height: 2000px; /* for scrolling */
}

/* Common box style */
.box {
    width: 150px;
    height: 100px;
    color: white;
    text-align: center;
    line-height: 100px;
    margin: 20px;
}

/* Static (default) */
.static {
    background: gray;
    position: static;
}

/* Relative */
.relative {
    background: blue;
    position: relative;
    top: 20px;
    left: 30px;
}

/* Absolute */
.parent {
    position: relative;
    height: 200px;
    border: 2px solid black;
    margin: 20px;
}

.absolute {
    background: red;
    position: absolute;
    top: 20px;
    right: 20px;
}

/* Fixed */
.fixed {
    background: green;
    position: fixed;
    bottom: 10px;
    right: 10px;
}

/* Sticky */
.sticky {
    background: purple;
    position: sticky;
    top: 0;
}
</style>

</head>

<body>

<h2 class="sticky">Sticky Header</h2>

<div class="box static">Static</div>

<div class="box relative">Relative</div>

<div class="parent">
    Parent Box
    <div class="box absolute">Absolute</div>
</div>

<div class="box fixed">Fixed</div>

<p>Scroll down to see sticky and fixed effects...</p>

</body>
</html>
