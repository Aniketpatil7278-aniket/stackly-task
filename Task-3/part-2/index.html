<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS box Modeling -02</title>
    <link rel="stylesheet" href="Style.css">

</head>

<body>

    <div class="card">
        <h1>ABC Engineering College</h1>
        <div class="subtitle">Student Identity Card</div>
        <hr>

        <img src="./Assets/profile.jpg" alt="profileimg" class="profile-img">
        <div class="name">Aniket Patil</div>

        <div class="info">
            <p><span>ID No: </span> 2GI23MC010</p>
            <p><span>Department: </span>MCA</p>
            <p><span>Year: </span>2025</p>
            <p><span>DOB: </span>06-11-2002</p>
            <p><span>Blood Group: </span>A+</p>
            <p><span>Phone: </span>78xxxxx376</p>
        </div>

        <hr>

        <div class="footer">
            <p>Valid Till: May 2026</p>
            <p class="signature">Authorized Signature</p>
        </div>
    </div>
</body>

</html>
